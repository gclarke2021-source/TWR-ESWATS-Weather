
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a1428" />
<title>Weather Stations — Lugaganeni & Mpangela</title>
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<style>
  :root {
    --bg: #06101f;
    --panel: #0a1428;
    --panel-2: rgba(255,255,255,0.035);
    --border: rgba(207,227,255,0.12);
    --text: #cfe3ff;
    --dim: rgba(207,227,255,0.55);
    --faint: rgba(207,227,255,0.35);
    --blue: #85B7EB;
    --red: #F09595;
    --white: #ffffff;
    --amber: #FAC775;
    --purple: #AFA9EC;
    --warn: #FAC775;
    --label-wind: #D85A30;
    --label-out: #378ADD;
    --label-rain: #185FA5;
    --label-hilo: #1D9E75;
    --label-press: #7F77DD;
    --label-solar: #BA7517;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body {
    padding: 12px;
    padding-top: max(12px, env(safe-area-inset-top));
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    padding-left: max(12px, env(safe-area-inset-left));
    padding-right: max(12px, env(safe-area-inset-right));
  }

  /* ── station selector overlay ── */
  #selector-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  #selector-overlay.hidden { display: none; }
  .selector-card {
    background: var(--panel);
    border: 0.5px solid rgba(207,227,255,0.18);
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%; max-width: 320px;
  }
  .selector-card h1 {
    font-family: ui-monospace, monospace;
    font-size: 13px; font-weight: 500;
    color: var(--text); letter-spacing: 1px;
    text-transform: uppercase; margin: 0 0 4px;
  }
  .selector-card p {
    font-size: 11px; color: var(--dim);
    margin: 0 0 20px; letter-spacing: 0.3px;
    font-family: ui-monospace, monospace;
  }
  .sel-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 12px 14px; margin-bottom: 8px;
    background: var(--panel-2);
    border: 0.5px solid rgba(207,227,255,0.18);
    border-radius: 8px;
    color: rgba(207,227,255,0.85); font-size: 12px;
    letter-spacing: 0.6px; text-transform: uppercase;
    font-family: ui-monospace, monospace;
    cursor: pointer; text-align: left;
    transition: background 150ms, border-color 150ms;
  }
  .sel-btn:hover { background: rgba(55,138,221,0.15); border-color: rgba(55,138,221,0.45); color: #85B7EB; }
  .sel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(207,227,255,0.25); flex-shrink: 0; }

  /* ── header ── */
  .app-header {
    display: flex; justify-content: space-between; align-items: center;
    max-width: 1200px; margin: 0 auto 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px; color: var(--dim); letter-spacing: 0.5px;
    gap: 8px;
  }
   /* ── installed-PWA title bar (Window Controls Overlay) ── */
  @media (display-mode: window-controls-overlay) {
    /* push content down clear of the OS control buttons */
    body { padding-top: env(titlebar-area-height, 40px); }

    /* the header becomes the OS drag handle */
    .app-header { -webkit-app-region: drag; }

    /* anything interactive must opt back out of dragging */
    .app-title,
    .app-header #status,
    .app-header #clock,
    .app-header .icon-btn { -webkit-app-region: no-drag; }
  }
  .app-title { color: var(--text); font-weight: 500; white-space: nowrap; }
  .status-line { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #5dcaa5; display: inline-block; margin-right: 6px; }
  .status-dot.stale { background: var(--warn); }
  .status-dot.err { background: var(--red); }
  .icon-btn {
    width: 26px; height: 26px; border-radius: 6px;
    border: 0.5px solid rgba(207,227,255,0.2);
    background: var(--panel-2);
    color: var(--dim); font-size: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 150ms, color 150ms;
    font-family: ui-monospace, monospace;
    padding: 0;
  }
  .icon-btn:hover { background: rgba(207,227,255,0.08); color: var(--text); }
  .icon-btn.spinning { animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── grid ── */
  .stations-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 12px;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 820px) {
    .stations-grid { grid-template-columns: minmax(0, 1fr); }
  }

  /* ── panel ── */
  .panel {
    background: var(--panel);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    min-width: 0;
    overflow: hidden;
  }
  .panel-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2px 4px 10px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 10px;
    gap: 8px;
  }
  .panel-name { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 1px; white-space: nowrap; }
  .panel-meta { font-size: 10px; color: var(--dim); white-space: nowrap; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
  }
  .cell {
    background: var(--panel-2);
    border-radius: 8px;
    padding: 8px;
    min-width: 0;
    min-height: 86px;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .cell-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px;
    padding: 2px 6px; border-radius: 3px; display: inline-block;
    font-weight: 500; align-self: flex-start;
    margin-bottom: 6px;
  }
  .lbl-wind  { background: var(--label-wind);  color: #FAECE7; }
  .lbl-out   { background: var(--label-out);   color: #E6F1FB; }
  .lbl-rain  { background: var(--label-rain);  color: #E6F1FB; }
  .lbl-hilo  { background: var(--label-hilo);  color: #E1F5EE; }
  .lbl-press { background: var(--label-press); color: #EEEDFE; }
  .lbl-solar { background: var(--label-solar); color: #FAEEDA; }

  .big { font-size: 26px; font-weight: 500; letter-spacing: -0.5px; line-height: 1; }
  .med { font-size: 18px; font-weight: 500; line-height: 1; }
  .sm  { font-size: 14px; font-weight: 500; line-height: 1; }
  .xs  { font-size: 12px; font-weight: 500; line-height: 1; }
  .c-blue  { color: var(--blue); }
  .c-red   { color: var(--red); }
  .c-white { color: var(--white); }
  .c-amber { color: var(--amber); }
  .c-purple{ color: var(--purple); }
  .unit { font-size: 10px; margin-left: 2px; opacity: 0.85; }
  .sub  { font-size: 9px; color: var(--dim); margin-top: 3px; line-height: 1.4; text-transform: uppercase; letter-spacing: 0.5px; }
  .sub-note { font-size: 10px; color: var(--dim); margin-top: 4px; line-height: 1.45; }
  .hint { font-size: 9px; color: var(--warn); margin-top: 4px; font-style: italic; }

  /* ── compass ── */
  .compass-wrap {
    display: flex; flex-direction: column; align-items: center;
    flex: 1;
  }
  .compass-svg { width: 100%; max-width: 130px; height: auto; display: block; margin: 0 auto; }
  .wind-bottom {
    font-size: 9px; color: var(--dim); text-align: center; margin-top: 3px;
    white-space: nowrap;
  }

  /* ── outdoor cell ── */
  .outdoor-temp-row { display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }

  /* ── weather condition icon (in outdoor cell) ── */
  .weather-icon-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 10px;
    min-height: 56px;
  }
  .weather-icon-wrap svg {
    width: 56px;
    height: 56px;
    display: block;
  }
  .weather-icon-wrap:empty { display: none; }
  .today-hilo { display: flex; gap: 10px; margin-top: 6px; font-size: 10px; color: var(--dim); }
  .today-hilo > span { white-space: nowrap; }
  .today-hilo span.val { color: var(--white); font-weight: 500; }
  .humidity-row { margin-top: 6px; display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .humidity-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── yesterday ── */
  .hilo-row { display: flex; flex-direction: column; gap: 6px; margin-top: 2px; }

  /* ── rain ── */
  .rain-row { display: flex; gap: 8px; margin-top: 2px; }
  .rain-col { flex: 1; min-width: 0; }

  /* ── pressure trend ── */
  .pressure-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .trend { font-size: 16px; line-height: 1; }
  .trend-up   { color: #F09595; }
  .trend-down { color: #85B7EB; }
  .trend-flat { color: var(--dim); }

  /* ── solar ── */
  .solar-row { display: flex; gap: 6px; margin-top: 2px; }
  .solar-col { flex: 1; min-width: 0; }
  .solar-col .med { font-size: 15px; }
  .solar-col .unit { font-size: 9px; }

  .panel.offline { opacity: 0.7; }
  .panel.offline .panel-meta { color: var(--red); }

  .skeleton .big, .skeleton .med, .skeleton .sm {
    color: transparent;
    background: linear-gradient(90deg, rgba(207,227,255,0.08), rgba(207,227,255,0.18), rgba(207,227,255,0.08));
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
    display: inline-block;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  footer {
    max-width: 1200px; margin: 12px auto 0;
    font-size: 10px; color: var(--faint);
    text-align: center;
    font-family: ui-monospace, monospace;
    padding: 0 8px;
  }
</style>
</head>
<body>

<!-- Station selector overlay -->
<div id="selector-overlay">
  <div class="selector-card">
    <h1>Weather Stations</h1>
    <p>Choose which stations to display</p>
    <button class="sel-btn" data-choice="both">
      <span class="sel-dot"></span>Both stations
    </button>
    <button class="sel-btn" data-choice="lugaganeni">
      <span class="sel-dot"></span>Lugaganeni only
    </button>
    <button class="sel-btn" data-choice="mpangela">
      <span class="sel-dot"></span>Mpangela only
    </button>
  </div>
</div>

<header class="app-header">
  <span class="app-title">WEATHER STATIONS</span>
  <span class="status-line">
    <span id="status"><span class="status-dot"></span>connecting</span>
    <span id="clock">--:--</span>
    <button class="icon-btn" id="refresh-btn" title="Refresh now">↻</button>
    <button class="icon-btn" id="settings-btn" title="Choose stations">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" style="display:block">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </span>
</header>

<main class="stations-grid" id="stations"></main>

<footer>
  Auto-refresh every 5 min · data via Ambient Weather Network
</footer>

<template id="panel-template">
  <section class="panel skeleton">
    <div class="panel-head">
      <span class="panel-name"></span>
      <span class="panel-meta">loading…</span>
    </div>
    <div class="grid">
      <!-- wind -->
      <div class="cell">
        <span class="cell-label lbl-wind">Wind</span>
        <div class="compass-wrap">
          <!-- SVG compass: viewBox 170x170, tick ring r=62 at cx=85,cy=85, outer ring r=70, cardinals outside -->
          <svg class="compass-svg" viewBox="0 0 170 170" xmlns="http://www.w3.org/2000/svg">
            <circle cx="85" cy="85" r="70" fill="none" stroke="rgba(207,227,255,0.10)" stroke-width="0.5"/>
            <circle cx="85" cy="85" r="62" fill="none" stroke="rgba(207,227,255,0.22)" stroke-width="0.8"/>
            <!-- tick marks generated by JS -->
            <g data-f="compass-ticks"></g>
            <!-- cardinal labels well outside outer ring -->
            <text x="85" y="8"   text-anchor="middle" font-size="11" fill="rgba(207,227,255,0.9)"  font-family="ui-monospace,monospace" font-weight="500">N</text>
            <text x="85" y="168" text-anchor="middle" font-size="11" fill="rgba(207,227,255,0.5)"  font-family="ui-monospace,monospace">S</text>
            <text x="162" y="89" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="rgba(207,227,255,0.5)" font-family="ui-monospace,monospace">E</text>
            <text x="8"   y="89" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="rgba(207,227,255,0.5)" font-family="ui-monospace,monospace">W</text>
            <!-- km/h label and speed value in centre -->
            <text x="85" y="74" text-anchor="middle" font-size="9" fill="rgba(207,227,255,0.40)" font-family="ui-monospace,monospace">km/h</text>
            <text data-f="wind" x="85" y="100" text-anchor="middle" font-size="28" font-weight="500" fill="#FAC775" font-family="ui-monospace,monospace">–</text>
            <!-- Arrow: tip at (85,22) points toward centre (85,85). Rotated around (85,85). -->
            <g data-f="arrow" transform="rotate(0 85 85)">
              <polygon points="85,22 76,8 85,16 94,8" fill="#FAC775"/>
            </g>
          </svg>
        </div>
        <div class="wind-bottom" data-f="wind-dir">– · –</div>
      </div>
      <!-- outdoor: current + today hi/lo + humidity -->
      <div class="cell">
        <span class="cell-label lbl-out">Outdoor</span>
        <div class="outdoor-temp-row">
          <span class="big c-blue" data-f="temp">–<span class="unit">°C</span></span>
        </div>
        <div class="today-hilo">
          <span>H <span class="val" data-f="today-high">–</span></span>
          <span>L <span class="val" data-f="today-low">–</span></span>
        </div>
        <div class="humidity-row">
          <span class="humidity-label">Humidity</span>
          <span class="med c-red" data-f="hum">–<span class="unit">%</span></span>
        </div>
        <div class="weather-icon-wrap" data-f="weather-icon"></div>
        <div class="hint" data-f="terror" style="display:none;"></div>
      </div>
      <!-- yesterday -->
      <div class="cell">
        <span class="cell-label lbl-hilo">Yesterday</span>
        <div class="hilo-row">
          <div>
            <div class="sub">High</div>
            <div class="sm c-white" data-f="yhigh">–<span class="unit">°C</span></div>
          </div>
          <div>
            <div class="sub">Low</div>
            <div class="sm c-white" data-f="ylow">–<span class="unit">°C</span></div>
          </div>
        </div>
        <div class="hint" data-f="yerror" style="display:none;"></div>
      </div>
      <!-- rain -->
      <div class="cell">
        <span class="cell-label lbl-rain">Rain</span>
        <div class="rain-row">
          <div class="rain-col">
            <div class="sub">Today</div>
            <div class="med c-blue" data-f="rain-today">–<span class="unit">mm</span></div>
          </div>
          <div class="rain-col">
            <div class="sub">Yesterday</div>
            <div class="med c-white" data-f="rain-yest">–<span class="unit">mm</span></div>
          </div>
        </div>
        <div class="sub-note" style="margin-top:6px;">Rate <span data-f="rain-rate">–</span></div>
      </div>
      <!-- pressure -->
      <div class="cell">
        <span class="cell-label lbl-press">Pressure</span>
        <div class="pressure-row">
          <span class="med c-purple" data-f="pressure">–<span class="unit">hPa</span></span>
          <span class="trend" data-f="pressure-trend"></span>
        </div>
        <div class="sub-note" style="margin-top: 4px;">relative</div>
      </div>
      <!-- solar -->
      <div class="cell">
        <span class="cell-label lbl-solar">Solar</span>
        <div class="solar-row">
          <div class="solar-col">
            <div class="sub">UVI</div>
            <div class="med c-amber" data-f="uvi">–</div>
            <div class="sub-note" data-f="uvi-band">–</div>
          </div>
          <div class="solar-col">
            <div class="sub">Light</div>
            <div class="med c-white" data-f="light">–<span class="unit">W/m²</span></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</template>

<script>
(() => {
  'use strict';

  // ── Cache-bust: bump this string on every deploy to force SW to drop old caches ──
  const BUILD = '20260423-002';

  const API_URL = '/api/weather';
  const REFRESH_MS = 5 * 60 * 1000;
  const STALE_MS   = 2 * 60 * 1000; // don't re-fetch on tab focus if fresher than this

  const stationsEl  = document.getElementById('stations');
  const statusEl    = document.getElementById('status');
  const clockEl     = document.getElementById('clock');
  const refreshBtn  = document.getElementById('refresh-btn');
  const tmpl        = document.getElementById('panel-template');
  const overlay     = document.getElementById('selector-overlay');

  // ── Station selector ──────────────────────────────────────────────────────
  let activeStations = localStorage.getItem('aw-stations') || 'both';

  function applyStationChoice(choice) {
    activeStations = choice;
    localStorage.setItem('aw-stations', choice);
    overlay.classList.add('hidden');
    // Show/hide panels based on choice
    ['lugaganeni','mpangela'].forEach(id => {
      const el = document.getElementById('panel-' + id);
      if (el) el.style.display = shouldShow(id) ? '' : 'none';
    });
    // Fix grid columns when only one station
    stationsEl.style.gridTemplateColumns =
      choice === 'both' ? '' : 'minmax(0, 1fr)';
    refresh();
  }

  function shouldShow(id) {
    if (activeStations === 'both') return true;
    return activeStations === id;
  }

  overlay.querySelectorAll('.sel-btn').forEach(btn => {
    btn.addEventListener('click', () => applyStationChoice(btn.dataset.choice));
  });

  // Show selector on first load OR if a station icon is tapped
  if (!localStorage.getItem('aw-stations')) {
    overlay.classList.remove('hidden');
  } else {
    overlay.classList.add('hidden');
  }

  // ── Clock (ticks every 60 s, aligned to the minute) ──────────────────────
  function tick() {
    const d = new Date();
    clockEl.textContent = d.toTimeString().slice(0, 5);
  }
  tick();
  // align to next minute boundary then tick every 60s
  setTimeout(() => { tick(); setInterval(tick, 60000); },
    (60 - new Date().getSeconds()) * 1000);

  // ── UVI band ──────────────────────────────────────────────────────────────
  function uviBand(uv) {
    if (uv == null) return '–';
    if (uv < 3)  return 'Low';
    if (uv < 6)  return 'Moderate';
    if (uv < 8)  return 'High';
    if (uv < 11) return 'Very high';
    return 'Extreme';
  }

  // ── Formatters ────────────────────────────────────────────────────────────
  function fmt(v, digits = 1, unit = '') {
    if (v === null || v === undefined || Number.isNaN(v)) {
      return '–' + (unit ? `<span class="unit">${unit}</span>` : '');
    }
    const n = digits === 0 ? Math.round(v) : Number(v).toFixed(digits);
    return `${n}${unit ? `<span class="unit">${unit}</span>` : ''}`;
  }

  function fmtPlain(v, digits = 1, unit = '') {
    if (v === null || v === undefined || Number.isNaN(v)) return '–' + (unit ? ' ' + unit : '');
    const n = digits === 0 ? Math.round(v) : Number(v).toFixed(digits);
    return `${n}${unit ? ' ' + unit : ''}`;
  }

  // ── Status ────────────────────────────────────────────────────────────────
  function setStatus(state, text) {
    statusEl.innerHTML = `<span class="status-dot ${state}"></span>${text}`;
  }

  // ── Compass tick marks (drawn once per panel) ─────────────────────────────
  function buildTicks(ticksG) {
    if (ticksG.children.length > 0) return; // already built
    const ns = 'http://www.w3.org/2000/svg';
    for (let i = 0; i < 32; i++) {
      const angle = i * (360 / 32);
      const isMajor = i % 8 === 0;
      const r1 = 62, r2 = isMajor ? 54 : 57;
      const rad = (angle - 90) * Math.PI / 180;
      const x1 = 85 + r1 * Math.cos(rad), y1 = 85 + r1 * Math.sin(rad);
      const x2 = 85 + r2 * Math.cos(rad), y2 = 85 + r2 * Math.sin(rad);
      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke', isMajor ? 'rgba(207,227,255,0.5)' : 'rgba(207,227,255,0.22)');
      line.setAttribute('stroke-width', isMajor ? '1.2' : '0.7');
      ticksG.appendChild(line);
    }
  }

  // ── Cardinals ─────────────────────────────────────────────────────────────
  const CARDINALS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  function toCardinal(deg) {
    if (deg == null) return '–';
    return CARDINALS[Math.round(deg / 22.5) % 16];
  }

  // ── Pressure trend ────────────────────────────────────────────────────────
  // Store last two readings per station: { id: [p1, p2] }
  const pressureHistory = {};
  function pressureTrend(id, current) {
    if (current == null) return '';
    if (!pressureHistory[id]) pressureHistory[id] = [];
    pressureHistory[id].push(current);
    if (pressureHistory[id].length > 2) pressureHistory[id].shift();
    const hist = pressureHistory[id];
    if (hist.length < 2) return '';
    const diff = hist[1] - hist[0];
    if (diff > 0.2)  return '<span class="trend trend-up">↑</span>';
    if (diff < -0.2) return '<span class="trend trend-down">↓</span>';
    return '<span class="trend trend-flat">→</span>';
  }

  // ── Panel creation ────────────────────────────────────────────────────────
  function ensurePanel(station) {
    let el = document.getElementById('panel-' + station.id);
    if (!el) {
      el = tmpl.content.firstElementChild.cloneNode(true);
      el.id = 'panel-' + station.id;
      el.querySelector('.panel-name').textContent = station.name.toUpperCase();
      // Build tick marks for this panel's compass
      buildTicks(el.querySelector('[data-f="compass-ticks"]'));
      stationsEl.appendChild(el);
    }
    el.style.display = shouldShow(station.id) ? '' : 'none';
    return el;
  }

  // ── Paint a station panel ─────────────────────────────────────────────────
  // ── Weather condition ─────────────────────────────────────────────────────
  // Both stations are in Eswatini (Lugaganeni & Mpangela), close to lat -26.5°
  // lon 31.4°. Used for the solar position model that drives the day/night and
  // expected-clear-sky-irradiance calculation.
  const STATION_LAT = -26.5;
  const STATION_LON = 31.4;

  // Approximate clear-sky solar irradiance (W/m²) at the given UTC instant
  // for the station's lat/lon. Returns 0 when the sun is below the horizon.
  function expectedClearSkySolar(date) {
    const toRad = (d) => d * Math.PI / 180;
    // Day of year, 1..366
    const start = Date.UTC(date.getUTCFullYear(), 0, 0);
    const dayOfYear = Math.floor((date.getTime() - start) / 86400000);
    // Solar declination (Cooper's equation), degrees
    const decl = 23.45 * Math.sin(toRad(360 * (284 + dayOfYear) / 365));
    // Solar noon at our longitude, in UTC hours
    const utcHours = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
    const solarNoonUTC = 12 - STATION_LON / 15;
    const hourAngle = 15 * (utcHours - solarNoonUTC);
    // Sun elevation
    const sinElev =
      Math.sin(toRad(decl)) * Math.sin(toRad(STATION_LAT)) +
      Math.cos(toRad(decl)) * Math.cos(toRad(STATION_LAT)) * Math.cos(toRad(hourAngle));
    if (sinElev <= 0) return 0;
    // Clear-sky max ~ 1100 W/m² at zenith, scales ~ sin(elev)
    return 1100 * sinElev;
  }

  // Decide weather condition. Returns one of:
  //   'sunny', 'partly-cloudy-day', 'cloudy', 'cloudy-rain'
  //   'clear-night', 'partly-cloudy-night', 'cloudy-night', 'cloudy-rain-night'
  function getCondition(station) {
    const obsDate = station.observedAt ? new Date(station.observedAt) : new Date();
    const expected = expectedClearSkySolar(obsDate);
    const measured = (typeof station.solarWm2 === 'number') ? station.solarWm2 : 0;
    const isRaining = (typeof station.rainRateMmPerHr === 'number')
      ? station.rainRateMmPerHr > 0.05
      : false;
    // Daylight: sun is above horizon (expected > ~50 W/m² catches dusk/dawn)
    const isDay = expected > 50;

    if (isDay) {
      if (isRaining) return 'cloudy-rain';
      // Cloud-cover ratio = measured / expected, clamped to [0, 1.2]
      const ratio = expected > 0 ? Math.max(0, measured) / expected : 0;
      if (ratio >= 0.70) return 'sunny';
      if (ratio >= 0.35) return 'partly-cloudy-day';
      return 'cloudy';
    } else {
      // Night: no reliable cloud-cover signal from the station alone, so just
      // surface rain vs clear.
      if (isRaining) return 'cloudy-rain-night';
      return 'clear-night';
    }
  }

  // Inline SVG for each condition. 64x64 viewBox, sized via CSS in the wrap.
  const WEATHER_SVGS = {
    'sunny': `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="11" fill="#FAC775"/>
      <g stroke="#FAC775" stroke-width="2.5" stroke-linecap="round">
        <line x1="32" y1="6" x2="32" y2="13"/><line x1="32" y1="51" x2="32" y2="58"/>
        <line x1="6" y1="32" x2="13" y2="32"/><line x1="51" y1="32" x2="58" y2="32"/>
        <line x1="13.6" y1="13.6" x2="18.4" y2="18.4"/><line x1="45.6" y1="45.6" x2="50.4" y2="50.4"/>
        <line x1="13.6" y1="50.4" x2="18.4" y2="45.6"/><line x1="45.6" y1="18.4" x2="50.4" y2="13.6"/>
      </g></svg>`,
    'partly-cloudy-day': `<svg viewBox="0 0 72 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="22" r="10" fill="#FAC775"/>
      <g stroke="#FAC775" stroke-width="2" stroke-linecap="round">
        <line x1="26" y1="2" x2="26" y2="7"/><line x1="6" y1="22" x2="11" y2="22"/>
        <line x1="11.4" y1="7.4" x2="14.9" y2="10.9"/><line x1="37.1" y1="10.9" x2="40.6" y2="7.4"/>
        <line x1="11.4" y1="36.6" x2="14.9" y2="33.1"/>
      </g>
      <path d="M28 50 Q22 50 22 44 Q22 38 28 38 Q30 32 38 32 Q47 32 49 39 Q56 39 56 46 Q56 53 49 53 L28 53 Q24 53 24 50 Z" fill="#85B7EB" stroke="#cfe3ff" stroke-width="0.8"/>
    </svg>`,
    'cloudy': `<svg viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 44 Q6 44 6 36 Q6 28 14 28 Q16 18 28 18 Q42 18 44 30 Q54 30 54 38 Q54 46 46 46 L14 46 Q10 46 10 44 Z" fill="#85B7EB" stroke="#cfe3ff" stroke-width="0.8"/>
    </svg>`,
    'cloudy-rain': `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 36 Q6 36 6 28 Q6 20 14 20 Q16 10 28 10 Q42 10 44 22 Q54 22 54 30 Q54 38 46 38 L14 38 Q10 38 10 36 Z" fill="#85B7EB" stroke="#cfe3ff" stroke-width="0.8"/>
      <g stroke="#378ADD" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="46" x2="14" y2="56"/><line x1="30" y1="46" x2="26" y2="56"/><line x1="42" y1="46" x2="38" y2="56"/>
      </g></svg>`,
    'clear-night': `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M30 6 A18 18 0 1 0 42 30 A14 14 0 0 1 30 6 Z" fill="#cfe3ff"/>
    </svg>`,
    'partly-cloudy-night': `<svg viewBox="0 0 72 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M30 6 A16 16 0 1 0 42 28 A12 12 0 0 1 30 6 Z" fill="#cfe3ff"/>
      <path d="M28 50 Q22 50 22 44 Q22 38 28 38 Q30 32 38 32 Q47 32 49 39 Q56 39 56 46 Q56 53 49 53 L28 53 Q24 53 24 50 Z" fill="#85B7EB" stroke="#cfe3ff" stroke-width="0.8"/>
    </svg>`,
    'cloudy-night': `<svg viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 44 Q6 44 6 36 Q6 28 14 28 Q16 18 28 18 Q42 18 44 30 Q54 30 54 38 Q54 46 46 46 L14 46 Q10 46 10 44 Z" fill="#5a7898" stroke="#cfe3ff" stroke-width="0.8"/>
    </svg>`,
    'cloudy-rain-night': `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 36 Q6 36 6 28 Q6 20 14 20 Q16 10 28 10 Q42 10 44 22 Q54 22 54 30 Q54 38 46 38 L14 38 Q10 38 10 36 Z" fill="#5a7898" stroke="#cfe3ff" stroke-width="0.8"/>
      <g stroke="#378ADD" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="46" x2="14" y2="56"/><line x1="30" y1="46" x2="26" y2="56"/><line x1="42" y1="46" x2="38" y2="56"/>
      </g></svg>`
  };

  function weatherIconSvg(condition) {
    return WEATHER_SVGS[condition] || '';
  }

  function paint(station) {
    const el = ensurePanel(station);

    if (!station.online) {
      el.classList.remove('skeleton');
      el.classList.add('offline');
      el.querySelector('.panel-meta').textContent = 'offline';
      return;
    }
    el.classList.remove('skeleton', 'offline');

    const set = (k, html) => {
      const node = el.querySelector(`[data-f="${k}"]`);
      if (node) node.innerHTML = html;
    };
    const setText = (k, t) => {
      const node = el.querySelector(`[data-f="${k}"]`);
      if (node) node.textContent = t;
    };

    // Panel header
    const obs = station.observedAt
      ? new Date(station.observedAt).toTimeString().slice(0, 5) : '–';
    el.querySelector('.panel-meta').textContent = '● live · ' + obs;

    // ── Outdoor: current temp + today hi/lo + humidity ──
    set('temp', fmt(station.tempC, 1, '°C'));

    // Today hi/lo comes from station.today.tempHighC / tempLowC which the API
    // populates from the /devices/{mac}?limit=288 history call. If that call
    // was rate-limited, the API returns nulls (NOT current temp) and we show
    // "–" so the user isn't misled.
    const today = station.today || {};
    setText('today-high', fmtPlain(today.tempHighC, 1, ''));
    setText('today-low',  fmtPlain(today.tempLowC,  1, ''));
    set('hum', fmt(station.humidity, 0, '%'));

    // Weather condition icon (sun/moon/clouds/rain in the outdoor cell)
    const condition = getCondition(station);
    const iconNode = el.querySelector('[data-f="weather-icon"]');
    if (iconNode) iconNode.innerHTML = weatherIconSvg(condition);

    // Surface today-history error if there is one (so rate-limits are visible)
    const terrNode = el.querySelector('[data-f="terror"]');
    if (terrNode) {
      const tErr = station.historyErrors && station.historyErrors.today;
      if (tErr) {
        terrNode.style.display = '';
        terrNode.textContent = 'today history: ' + tErr;
      } else {
        terrNode.style.display = 'none';
        terrNode.textContent = '';
      }
    }

    // ── Wind compass ──
    // Speed value inside compass
    const windVal = (station.windKph == null) ? '–' : Number(station.windKph).toFixed(1);
    setText('wind', windVal);

    // Arrow rotation: wind direction degrees. 0° = N at top, arrow tip points to centre.
    const arrowEl = el.querySelector('[data-f="arrow"]');
    if (typeof station.windDirDeg === 'number') {
      arrowEl.setAttribute('transform', `rotate(${station.windDirDeg} 85 85)`);
    }

    // Below compass: cardinal + gust
    const cardinal = station.windDirCardinal || toCardinal(station.windDirDeg);
    const gustStr  = station.gustKph != null
      ? `Gust ${Number(station.gustKph).toFixed(1)} km/h`
      : station.windGustKph != null
        ? `Gust ${Number(station.windGustKph).toFixed(1)} km/h`
        : '';
    setText('wind-dir', cardinal + (gustStr ? ' · ' + gustStr : ''));

    // ── Yesterday hi/lo ──
    const y = station.yesterday || {};
    set('yhigh', fmt(y.tempHighC, 1, '°C'));
    set('ylow',  fmt(y.tempLowC,  1, '°C'));

    const yerrNode = el.querySelector('[data-f="yerror"]');
    const yErr = station.historyErrors && station.historyErrors.yesterday;
    if (yErr) {
      yerrNode.style.display = '';
      yerrNode.textContent = 'history: ' + yErr;
    } else if ((y.tempHighC == null) && station.historyCounts && station.historyCounts.yesterday === 0) {
      yerrNode.style.display = '';
      yerrNode.textContent = 'no history returned';
    } else {
      yerrNode.style.display = 'none';
    }

    // ── Rain ──
    set('rain-today', fmt(station.rainTodayMm, 1, 'mm'));
    set('rain-yest',  fmt(y.rainMm, 1, 'mm'));
    setText('rain-rate',
      station.rainRateMmPerHr == null ? '–' : Number(station.rainRateMmPerHr).toFixed(1) + ' mm/h');

    // ── Pressure + trend ──
    set('pressure', fmt(station.pressureHpa, 1, 'hPa'));
    set('pressure-trend', pressureTrend(station.id, station.pressureHpa));

    // ── Solar ──
    set('uvi', fmt(station.uv, 0));
    setText('uvi-band', uviBand(station.uv));
    set('light', fmt(station.solarWm2, 0, 'W/m²'));
  }

  // ── Refresh ───────────────────────────────────────────────────────────────
  let refreshTimer = null;
  let lastFetchAt  = 0;

  async function refresh(force = false) {
    // Don't hammer on every tab-focus if data is still fresh
    if (!force && Date.now() - lastFetchAt < STALE_MS) return;

    refreshBtn.classList.add('spinning');
    try {
      setStatus('', 'updating…');
      const res = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      lastFetchAt = Date.now();
      for (const s of data.stations) paint(s);
      const when = new Date(data.fetchedAt).toTimeString().slice(0, 5);
      setStatus('', `updated ${when}`);
    } catch (e) {
      console.error(e);
      setStatus('err', 'update failed');
    } finally {
      refreshBtn.classList.remove('spinning');
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => refresh(true), REFRESH_MS);
    }
  }

  // Refresh button
  refreshBtn.addEventListener('click', () => refresh(true));

  // ── Settings (cog) — re-open the station selector overlay ─────────────────
  const settingsBtn = document.getElementById('settings-btn');
  if (settingsBtn) {
    settingsBtn.addEventListener('click', () => {
      overlay.classList.remove('hidden');
    });
  }

  // ── Init panels (skeleton placeholders) ──────────────────────────────────
  ensurePanel({ id: 'lugaganeni', name: 'Lugaganeni' });
  ensurePanel({ id: 'mpangela',   name: 'Mpangela' });

  // Apply saved station choice layout
  stationsEl.style.gridTemplateColumns =
    activeStations === 'both' ? '' : 'minmax(0, 1fr)';

  // ── Start fetching (only if selector already dismissed) ──────────────────
  if (!overlay.classList.contains('hidden') === false) {
    refresh(true);
  } else {
    refresh(true);
  }

  // ── Visibility change: only refresh if stale ─────────────────────────────
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') refresh(false);
  });

  // ── Service worker registration ───────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>
