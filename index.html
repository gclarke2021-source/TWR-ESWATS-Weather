<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a1428" />
<title>Weather Stations — Lugaganeni & Mpangela</title>
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<style>
  :root {
    --bg: #06101f;
    --panel: #0a1428;
    --panel-2: rgba(255,255,255,0.035);
    --border: rgba(207,227,255,0.12);
    --text: #cfe3ff;
    --dim: rgba(207,227,255,0.55);
    --faint: rgba(207,227,255,0.35);
    --blue: #85B7EB;
    --red: #F09595;
    --white: #ffffff;
    --amber: #FAC775;
    --green: #9FE1CB;
    --purple: #AFA9EC;
    --coral: #F0997B;
    --label-wind: #D85A30;
    --label-out: #378ADD;
    --label-rain: #185FA5;
    --label-hilo: #1D9E75;
    --label-press: #7F77DD;
    --label-solar: #BA7517;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    padding: 16px;
    padding-top: max(16px, env(safe-area-inset-top));
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }
  .app-header {
    display: flex; justify-content: space-between; align-items: center;
    max-width: 1200px; margin: 0 auto 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px; color: var(--dim); letter-spacing: 0.5px;
  }
  .app-title { color: var(--text); font-weight: 500; }
  .status-line { display: flex; gap: 14px; align-items: center; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #5dcaa5; display: inline-block; margin-right: 6px; }
  .status-dot.stale { background: var(--amber); }
  .status-dot.err { background: var(--red); }

  .stations-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 820px) {
    .stations-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .panel-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2px 4px 10px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 10px;
  }
  .panel-name { font-size: 14px; font-weight: 500; color: var(--text); letter-spacing: 1px; }
  .panel-meta { font-size: 10px; color: var(--dim); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .cell {
    background: var(--panel-2);
    border-radius: 8px;
    padding: 10px;
    min-height: 86px;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .cell-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px;
    padding: 2px 6px; border-radius: 3px; display: inline-block;
    font-weight: 500; align-self: flex-start;
    margin-bottom: 6px;
  }
  .lbl-wind  { background: var(--label-wind);  color: #FAECE7; }
  .lbl-out   { background: var(--label-out);   color: #E6F1FB; }
  .lbl-rain  { background: var(--label-rain);  color: #E6F1FB; }
  .lbl-hilo  { background: var(--label-hilo);  color: #E1F5EE; }
  .lbl-press { background: var(--label-press); color: #EEEDFE; }
  .lbl-solar { background: var(--label-solar); color: #FAEEDA; }

  .big { font-size: 28px; font-weight: 500; letter-spacing: -0.5px; line-height: 1; }
  .med { font-size: 20px; font-weight: 500; line-height: 1; }
  .sm  { font-size: 16px; font-weight: 500; line-height: 1; }
  .c-blue  { color: var(--blue); }
  .c-red   { color: var(--red); }
  .c-white { color: var(--white); }
  .c-amber { color: var(--amber); }
  .c-purple{ color: var(--purple); }
  .unit { font-size: 11px; margin-left: 2px; opacity: 0.85; }
  .sub  { font-size: 10px; color: var(--dim); margin-top: 4px; line-height: 1.45; }
  .row-gap { margin-top: 8px; }

  /* compass */
  .compass {
    width: 58px; height: 58px; border-radius: 50%;
    border: 0.5px solid var(--faint);
    position: relative; margin: 2px auto 0;
  }
  .cdir { position: absolute; font-size: 8px; color: var(--faint); }
  .cdir-n { top: 2px; left: 50%; transform: translateX(-50%); }
  .cdir-s { bottom: 2px; left: 50%; transform: translateX(-50%); }
  .cdir-e { right: 3px; top: 50%; transform: translateY(-50%); }
  .cdir-w { left: 3px; top: 50%; transform: translateY(-50%); }
  .compass-val {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 13px; font-weight: 500; color: var(--amber);
  }
  .compass-arrow {
    position: absolute; top: 50%; left: 50%;
    width: 2px; height: 22px; background: var(--amber);
    transform-origin: 1px 0; border-radius: 2px;
    transition: transform 400ms ease;
  }
  .wind-bottom {
    font-size: 9px; color: var(--dim); text-align: center; margin-top: 3px;
  }

  /* two-column mini inside yesterday cell */
  .hilo-row { display: flex; gap: 14px; margin-top: 4px; }
  .hilo-row .col { flex: 1; }

  /* two-column rain layout - today vs yesterday equally prominent */
  .rain-row { display: flex; gap: 10px; margin-top: 2px; }
  .rain-col { flex: 1; }

  /* offline / error state */
  .panel.offline { opacity: 0.7; }
  .panel.offline .panel-meta { color: var(--red); }
  .err-msg {
    padding: 14px; font-size: 12px; color: var(--red);
    text-align: center;
  }

  /* skeleton shimmer while loading */
  .skeleton .big, .skeleton .med, .skeleton .sm {
    color: transparent;
    background: linear-gradient(90deg, rgba(207,227,255,0.08), rgba(207,227,255,0.18), rgba(207,227,255,0.08));
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
    display: inline-block;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  footer {
    max-width: 1200px; margin: 14px auto 0;
    font-size: 11px; color: var(--faint);
    text-align: center;
    font-family: ui-monospace, monospace;
  }
  footer a { color: var(--dim); }
</style>
</head>
<body>

<header class="app-header">
  <span class="app-title">WEATHER STATIONS</span>
  <span class="status-line">
    <span id="status"><span class="status-dot"></span>connecting</span>
    <span id="clock">--:--</span>
  </span>
</header>

<main class="stations-grid" id="stations">
  <!-- Panels injected here -->
</main>

<footer>
  Auto-refresh every 5 min · data via Ambient Weather Network
</footer>

<template id="panel-template">
  <section class="panel skeleton">
    <div class="panel-head">
      <span class="panel-name"></span>
      <span class="panel-meta">loading…</span>
    </div>
    <div class="grid">
      <!-- wind -->
      <div class="cell">
        <span class="cell-label lbl-wind">Wind</span>
        <div class="compass">
          <span class="cdir cdir-n">N</span>
          <span class="cdir cdir-s">S</span>
          <span class="cdir cdir-e">E</span>
          <span class="cdir cdir-w">W</span>
          <span class="compass-arrow" data-f="arrow" style="transform: translate(-50%, 0) rotate(0deg);"></span>
          <span class="compass-val" data-f="wind">–</span>
        </div>
        <div class="wind-bottom" data-f="wind-dir">km/h · –</div>
      </div>
      <!-- outdoor -->
      <div class="cell">
        <span class="cell-label lbl-out">Outdoor</span>
        <div class="big c-blue" data-f="temp">–<span class="unit">°C</span></div>
        <div class="med c-red row-gap" data-f="hum">–<span class="unit">%</span></div>
      </div>
      <!-- yesterday -->
      <div class="cell">
        <span class="cell-label lbl-hilo">Yesterday</span>
        <div class="hilo-row">
          <div class="col">
            <div class="sub">High</div>
            <div class="sm c-white" data-f="yhigh">–<span class="unit">°C</span></div>
            <div class="sub" style="margin-top:10px;">Low</div>
            <div class="sm c-white" data-f="ylow">–<span class="unit">°C</span></div>
          </div>
        </div>
      </div>
      <!-- rain -->
      <div class="cell">
        <span class="cell-label lbl-rain">Rain</span>
        <div class="rain-row">
          <div class="rain-col">
            <div class="sub">Today</div>
            <div class="med c-blue" data-f="rain-today">–<span class="unit">mm</span></div>
          </div>
          <div class="rain-col">
            <div class="sub">Yesterday</div>
            <div class="med c-white" data-f="rain-yest">–<span class="unit">mm</span></div>
          </div>
        </div>
        <div class="sub" style="margin-top:8px;">Rate <span data-f="rain-rate">–</span></div>
      </div>
      <!-- pressure -->
      <div class="cell">
        <span class="cell-label lbl-press">Pressure</span>
        <div class="med c-purple" data-f="pressure">–<span class="unit">hPa</span></div>
        <div class="sub" style="margin-top: 6px;">relative</div>
      </div>
      <!-- solar (UVI + Light combined) -->
      <div class="cell">
        <span class="cell-label lbl-solar">Solar</span>
        <div class="hilo-row">
          <div class="col">
            <div class="sub">UVI</div>
            <div class="med c-amber" data-f="uvi">–</div>
            <div class="sub" data-f="uvi-band">–</div>
          </div>
          <div class="col">
            <div class="sub">Light</div>
            <div class="med c-white" data-f="light">–<span class="unit">W/m²</span></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</template>

<script>
(() => {
  'use strict';

  const API_URL = '/api/weather';
  const REFRESH_MS = 5 * 60 * 1000;

  const stationsEl = document.getElementById('stations');
  const statusEl = document.getElementById('status');
  const clockEl = document.getElementById('clock');
  const tmpl = document.getElementById('panel-template');

  function uviBand(uv) {
    if (uv == null) return '–';
    if (uv < 3) return 'Low';
    if (uv < 6) return 'Moderate';
    if (uv < 8) return 'High';
    if (uv < 11) return 'Very high';
    return 'Extreme';
  }

  function fmt(v, digits = 1, unit = '') {
    if (v === null || v === undefined || Number.isNaN(v)) {
      return '–' + (unit ? `<span class="unit">${unit}</span>` : '');
    }
    const n = digits === 0 ? Math.round(v) : Number(v).toFixed(digits);
    return `${n}${unit ? `<span class="unit">${unit}</span>` : ''}`;
  }

  function setStatus(state, text) {
    statusEl.innerHTML = `<span class="status-dot ${state}"></span>${text}`;
  }

  function tick() {
    const d = new Date();
    clockEl.textContent = d.toTimeString().slice(0, 5);
  }
  tick();
  setInterval(tick, 1000 * 30);

  function ensurePanel(station) {
    let el = document.getElementById('panel-' + station.id);
    if (!el) {
      el = tmpl.content.firstElementChild.cloneNode(true);
      el.id = 'panel-' + station.id;
      el.querySelector('.panel-name').textContent = station.name.toUpperCase();
      stationsEl.appendChild(el);
    }
    return el;
  }

  function paint(station) {
    const el = ensurePanel(station);
    el.classList.remove('skeleton');

    if (!station.online) {
      el.classList.add('offline');
      el.querySelector('.panel-meta').textContent = 'offline';
      return;
    }
    el.classList.remove('offline');

    const set = (k, html) => {
      const node = el.querySelector(`[data-f="${k}"]`);
      if (node) node.innerHTML = html;
    };

    const obs = station.observedAt
      ? new Date(station.observedAt).toTimeString().slice(0, 5)
      : '–';
    el.querySelector('.panel-meta').textContent = '● live · ' + obs;

    set('temp', fmt(station.tempC, 1, '°C'));
    set('hum', fmt(station.humidity, 0, '%'));

    set('wind', fmt(station.windKph, 1));
    el.querySelector('[data-f="wind-dir"]').textContent =
      `km/h · ${station.windDirCardinal || '–'}`;
    const arrow = el.querySelector('[data-f="arrow"]');
    if (typeof station.windDirDeg === 'number') {
      // wind direction = where wind is FROM. Arrow points TO (opposite).
      const rot = (station.windDirDeg + 180) % 360;
      arrow.style.transform = `translate(-50%, 0) rotate(${rot}deg)`;
    }

    const y = station.yesterday || {};
    set('yhigh', fmt(y.tempHighC, 1, '°C'));
    set('ylow', fmt(y.tempLowC, 1, '°C'));

    set('rain-today', fmt(station.rainTodayMm, 1, 'mm'));
    set('rain-yest', fmt(y.rainMm, 1, 'mm'));
    const rate = station.rainRateMmPerHr == null ? '–'
      : Number(station.rainRateMmPerHr).toFixed(1) + ' mm/h';
    el.querySelector('[data-f="rain-rate"]').textContent = rate;

    set('pressure', fmt(station.pressureHpa, 1, 'hPa'));
    set('uvi', fmt(station.uv, 0));
    el.querySelector('[data-f="uvi-band"]').textContent = uviBand(station.uv);
    set('light', fmt(station.solarWm2, 0, 'W/m²'));
  }

  let refreshTimer = null;
  async function refresh() {
    try {
      setStatus('', 'updating…');
      const res = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      for (const s of data.stations) paint(s);
      const when = new Date(data.fetchedAt).toTimeString().slice(0, 5);
      setStatus('', `updated ${when}`);
    } catch (e) {
      console.error(e);
      setStatus('err', 'update failed');
    } finally {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(refresh, REFRESH_MS);
    }
  }

  // Pre-create skeleton panels so the page has structure before data arrives
  ensurePanel({ id: 'lugaganeni', name: 'Lugaganeni' });
  ensurePanel({ id: 'mpangela', name: 'Mpangela' });

  refresh();

  // Refresh when the tab becomes visible again (people checking the dashboard)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') refresh();
  });

  // Register service worker for PWA behaviour (install as phone/desktop app)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>
